<!DOCTYPE html>
<html lang="de" class="h-full bg-zinc-950 text-zinc-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reel Mode - TELC B2 Diskussionstrainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at center, #18181b 0%, #09090b 100%);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 9999px;
        }
    </style>
</head>
<body class="h-full flex items-center justify-center overflow-hidden">

    <!-- Container designed to simulate a 9:16 mobile display card on screens, and scale full-screen on mobile -->
    <div class="relative w-full max-w-md h-full md:h-[92vh] md:max-h-[850px] bg-zinc-900 border-0 md:border md:border-zinc-800 md:rounded-3xl shadow-2xl flex flex-col justify-between overflow-hidden transition-all duration-300">
        
        <!-- Reel Header: Title, topic indicator and quick navigation -->
        <header class="p-4 border-b border-zinc-800 bg-zinc-900/80 backdrop-blur-md z-10">
            <div class="flex items-center justify-between">
                <div>
                    <span id="topic-badge" class="px-2.5 py-0.5 rounded bg-indigo-500/20 text-indigo-400 text-[10px] font-bold uppercase tracking-wider">Thema 1</span>
                    <h2 id="topic-title" class="text-sm font-extrabold tracking-tight truncate max-w-[220px] mt-1 text-zinc-100">Wird geladen...</h2>
                </div>
                <div class="flex items-center gap-1">
                    <button onclick="prevTopic()" class="p-1.5 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-zinc-300 hover:text-white transition-all text-xs" title="Vorheriges Thema">
                        ◀
                    </button>
                    <button onclick="nextTopic()" class="p-1.5 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-zinc-300 hover:text-white transition-all text-xs" title="Nächstes Thema">
                        ▶
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Dialog Reel Content Screen -->
        <main id="chat-scroller" class="flex-1 overflow-y-auto px-4 py-6 space-y-4 custom-scrollbar flex flex-col justify-start">
            <!-- Simulated conversation lines will append here dynamically -->
        </main>

        <!-- Translation Subtitles / Caption Block -->
        <div id="translation-caption-container" class="px-4 py-3 bg-indigo-950/40 border-t border-zinc-800 text-center min-h-[60px] flex items-center justify-center transition-all duration-300">
            <p id="translation-subtitle" class="text-xs italic text-indigo-200 leading-relaxed font-medium">Bilingualer Untertitel erscheint hier beim Abspielen...</p>
        </div>

        <!-- System Controls Panel (Play / Speed / Languages) -->
        <footer class="p-4 bg-zinc-900/90 border-t border-zinc-800 space-y-3 z-10">
            <div class="flex items-center justify-between gap-2 flex-wrap">
                <!-- Dialogue Play/Pause Trigger Button -->
                <button id="playback-trigger" onclick="togglePlayback()" class="flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-white font-bold text-xs shadow-md shadow-indigo-600/10 transition-all">
                    <span id="trigger-icon">▶</span>
                    <span id="trigger-text">Simulation starten</span>
                </button>

                <!-- Translation Dropdown Config -->
                <select id="translation-selector" onchange="changeSubtitleLang()" class="text-xs bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2.5 font-bold text-zinc-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors cursor-pointer">
                    <option value="en">Subtitle: EN</option>
                    <option value="ar">Subtitle: AR</option>
                    <option value="none">No Subtitles</option>
                </select>
                
                <!-- Speed selection config -->
                <select id="speed-selector" onchange="changeSpeed()" class="text-xs bg-zinc-800 border border-zinc-700 rounded-xl px-2 py-2.5 font-bold text-zinc-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors cursor-pointer">
                    <option value="0.8">0.8x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1.0x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.2">1.2x</option>
                </select>
            </div>
            
            <div class="flex items-center justify-between text-[10px] text-zinc-500 font-semibold px-1">
                <span>Auto-Scroll: Aktiv</span>
                <span>Wischen / Klicken zum Navigieren</span>
            </div>
        </footer>
    </div>

    <!-- MAIN SOUND & VISUAL SCRIPT INTERACTION -->
    <script>
        let topicsList = [];
        let activeIdx = 0;
        let activeTopic = null;
        
        let currentSpeakerLine = -1;
        let isPlaying = false;
        let synth = window.speechSynthesis;
        let activeUtterance = null;
        let playbackSpeed = 1.0;
        let subtitleLang = 'en';

        // Interface with parent memory space directly if present, or fetch fresh copies as fallback
        async function initializeReelEngine() {
            if (window.parent && window.parent.TOPICS_DATA && window.parent.TOPICS_DATA.length > 0) {
                topicsList = window.parent.TOPICS_DATA;
                activeIdx = window.parent.activeIdx || 0;
            } else {
                try {
                    const response = await fetch('topics.json');
                    topicsList = await response.json();
                    activeIdx = 0;
                } catch(e) {
                    console.error("Could not fetch fallback topics.json directly", e);
                }
            }
            loadActiveTopic();
        }

        function loadActiveTopic() {
            if (topicsList.length === 0) return;
            activeTopic = topicsList[activeIdx];
            
            // Sync parent active page context if loaded inside the master shell
            if (window.parent && typeof window.parent.activeIdx !== 'undefined') {
                window.parent.activeIdx = activeIdx;
                if (typeof window.parent.renderActiveTopic === 'function') {
                    window.parent.renderActiveTopic();
                    window.parent.renderSidebar();
                }
            }

            // UI Refresh setup
            document.getElementById('topic-badge').textContent = `Thema ${activeTopic.id} / 52`;
            document.getElementById('topic-title').textContent = activeTopic.title_de;
            
            resetPlaybackState();
            renderDialogueReel();
        }

        function renderDialogueReel() {
            const scroller = document.getElementById('chat-scroller');
            scroller.innerHTML = "";

            if (!activeTopic || !activeTopic.dialog) return;

            activeTopic.dialog.forEach((chat, index) => {
                const isA = chat.role.includes('Schüler A') || chat.role.includes('Schülerin A');
                const row = document.createElement('div');
                
                // Align left for Student A, Align right for Student B
                row.className = `flex w-full ${isA ? 'justify-start' : 'justify-end'} animate-fade-in transition-all duration-300`;
                row.id = `line-wrapper-${index}`;
                
                row.innerHTML = `
                    <div id="dialog-bubble-${index}" onclick="jumpToSpeakerLine(${index})" class="max-w-[85%] rounded-2xl p-3.5 cursor-pointer transition-all border duration-200 ${
                        isA 
                        ? 'bg-zinc-800/80 border-zinc-700 text-indigo-200 rounded-bl-none shadow-md hover:bg-zinc-700' 
                        : 'bg-indigo-950/70 border-indigo-900/60 text-indigo-100 rounded-br-none shadow-md hover:bg-indigo-900/60'
                    }">
                        <div class="flex items-center justify-between gap-4 mb-1 text-[9px] font-extrabold uppercase tracking-widest ${isA ? 'text-indigo-400' : 'text-emerald-400'}">
                            <span>${chat.role}</span>
                            <span>Line ${index + 1}</span>
                        </div>
                        <p class="text-sm font-semibold leading-relaxed text-zinc-100">${chat.de}</p>
                    </div>
                `;
                scroller.appendChild(row);
            });
            
            updateCaptionContainer("");
        }

        function jumpToSpeakerLine(idx) {
            resetUtterancePlayback();
            currentSpeakerLine = idx;
            isPlaying = true;
            updatePlaybackTriggerUI();
            speakSequence();
        }

        function togglePlayback() {
            if (isPlaying) {
                synth.cancel();
                isPlaying = false;
                updatePlaybackTriggerUI();
            } else {
                isPlaying = true;
                updatePlaybackTriggerUI();
                if (currentSpeakerLine === -1 || currentSpeakerLine >= activeTopic.dialog.length) {
                    currentSpeakerLine = 0;
                }
                speakSequence();
            }
        }

        function speakSequence() {
            if (!isPlaying) return;
            if (currentSpeakerLine >= activeTopic.dialog.length) {
                resetPlaybackState();
                return;
            }

            const item = activeTopic.dialog[currentSpeakerLine];
            highlightSpeakingBubble(currentSpeakerLine);
            scrollBubbleIntoView(currentSpeakerLine);

            // Render Subtitle Captions
            if (subtitleLang === 'en') {
                updateCaptionContainer(item.en || '');
            } else if (subtitleLang === 'ar') {
                updateCaptionContainer(item.ar || '', true);
            } else {
                updateCaptionContainer("");
            }

            // Speak line through system synthesizer
            synth.cancel();
            activeUtterance = new SpeechSynthesisUtterance(item.de);
            activeUtterance.lang = 'de-DE';
            activeUtterance.rate = playbackSpeed;

            activeUtterance.onend = () => {
                if (isPlaying) {
                    currentSpeakerLine++;
                    setTimeout(speakSequence, 900); // Short conversational delay
                }
            };

            activeUtterance.onerror = (e) => {
                if (isPlaying && e.error !== 'interrupted') {
                    console.warn("Speech generation error. Proceeding forward.", e);
                    currentSpeakerLine++;
                    speakSequence();
                }
            };

            synth.speak(activeUtterance);
        }

        function highlightSpeakingBubble(idx) {
            // Remove previous active state styling on all dialogues
            activeTopic.dialog.forEach((_, i) => {
                const bubble = document.getElementById(`dialog-bubble-${i}`);
                if (bubble) {
                    bubble.classList.remove('ring-2', 'ring-indigo-500', 'bg-zinc-800', 'bg-indigo-900', 'scale-102');
                    bubble.classList.add('opacity-40'); // Soft focus on unselected elements
                }
            });

            const activeBubble = document.getElementById(`dialog-bubble-${idx}`);
            if (activeBubble) {
                activeBubble.classList.remove('opacity-40');
                activeBubble.classList.add('ring-2', 'ring-indigo-500', 'scale-[1.02]');
            }
        }

        function scrollBubbleIntoView(idx) {
            const wrapper = document.getElementById(`line-wrapper-${idx}`);
            const scroller = document.getElementById('chat-scroller');
            if (wrapper && scroller) {
                scroller.scrollTo({
                    top: wrapper.offsetTop - scroller.offsetTop - 40,
                    behavior: 'smooth'
                });
            }
        }

        function updateCaptionContainer(text, isRTL = false) {
            const textEl = document.getElementById('translation-subtitle');
            textEl.textContent = text || "Bilingualer Untertitel erscheint hier beim Abspielen...";
            textEl.dir = isRTL ? 'rtl' : 'ltr';
            if (isRTL) {
                textEl.className = "text-sm text-amber-300 font-medium text-right leading-relaxed w-full";
            } else {
                textEl.className = "text-xs italic text-indigo-200 leading-relaxed font-medium";
            }
        }

        function resetUtterancePlayback() {
            synth.cancel();
            if (activeUtterance) {
                activeUtterance.onend = null;
                activeUtterance.onerror = null;
            }
        }

        function resetPlaybackState() {
            resetUtterancePlayback();
            isPlaying = false;
            currentSpeakerLine = -1;
            updatePlaybackTriggerUI();
            updateCaptionContainer("");
            
            // Restore visual focus settings across all dialog bubbles
            if (activeTopic && activeTopic.dialog) {
                activeTopic.dialog.forEach((_, i) => {
                    const bubble = document.getElementById(`dialog-bubble-${i}`);
                    if (bubble) {
                        bubble.classList.remove('ring-2', 'ring-indigo-500', 'scale-[1.02]', 'opacity-40');
                    }
                });
            }
        }

        function updatePlaybackTriggerUI() {
            const icon = document.getElementById('trigger-icon');
            const text = document.getElementById('trigger-text');
            const button = document.getElementById('playback-trigger');
            
            if (isPlaying) {
                icon.textContent = '⏸';
                text.textContent = 'Simulation pausieren';
                button.classList.replace('bg-indigo-600', 'bg-zinc-700');
                button.classList.replace('hover:bg-indigo-500', 'hover:bg-zinc-600');
            } else {
                icon.textContent = '▶';
                text.textContent = (currentSpeakerLine > 0) ? 'Fortsetzen' : 'Simulation starten';
                button.classList.replace('bg-zinc-700', 'bg-indigo-600');
                button.classList.replace('hover:bg-zinc-600', 'hover:bg-indigo-500');
            }
        }

        function changeSpeed() {
            const selector = document.getElementById('speed-selector');
            playbackSpeed = parseFloat(selector.value);
            if (isPlaying) {
                // Re-initialize running line immediately with fresh playback speed settings
                jumpToSpeakerLine(currentSpeakerLine);
            }
        }

        function changeSubtitleLang() {
            const selector = document.getElementById('translation-selector');
            subtitleLang = selector.value;
            if (isPlaying && currentSpeakerLine >= 0 && currentSpeakerLine < activeTopic.dialog.length) {
                const item = activeTopic.dialog[currentSpeakerLine];
                if (subtitleLang === 'en') {
                    updateCaptionContainer(item.en || '');
                } else if (subtitleLang === 'ar') {
                    updateCaptionContainer(item.ar || '', true);
                } else {
                    updateCaptionContainer("");
                }
            }
        }

        function prevTopic() {
            if (topicsList.length === 0) return;
            activeIdx = (activeIdx - 1 + topicsList.length) % topicsList.length;
            loadActiveTopic();
        }

        function nextTopic() {
            if (topicsList.length === 0) return;
            activeIdx = (activeIdx + 1) % topicsList.length;
            loadActiveTopic();
        }

        // Initialize script parameters
        initializeReelEngine();
    </script>
</body>
</html>
