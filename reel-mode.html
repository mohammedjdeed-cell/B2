<!DOCTYPE html>
<html lang="de" class="h-full bg-zinc-950 text-zinc-100 transition-colors duration-200" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reel Mode - TELC B2 Diskussionstrainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        :root, [data-theme="light"] {
            --bg-primary: #f7f6f2;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-muted: #64748b;
            --border-primary: #e2e8f0;
            --card-shadow: 0 10px 30px -10px rgba(0,0,0,0.08);
        }
        [data-theme="dark"] {
            --bg-primary: #09090b;
            --bg-card: #18181b;
            --text-primary: #f4f4f5;
            --text-muted: #a1a1aa;
            --border-primary: #27272a;
            --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 9999px;
        }

        /* Card Entry Animation & Stagger Delays */
        .card-active {
            animation: cardSlideUp 420ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes cardSlideUp {
            0% {
                opacity: 0;
                transform: translateY(60px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stagger-child {
            opacity: 0;
            animation: fadeInStagger 350ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .stagger-child:nth-child(1) { animation-delay: 40ms; }
        .stagger-child:nth-child(2) { animation-delay: 80ms; }
        .stagger-child:nth-child(3) { animation-delay: 120ms; }
        .stagger-child:nth-child(4) { animation-delay: 160ms; }
        .stagger-child:nth-child(5) { animation-delay: 200ms; }

        @keyframes fadeInStagger {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Watermark after styles */
        .watermark-card::after {
            content: var(--watermark-icon);
            font-size: 180px;
            opacity: 0.05;
            position: absolute;
            bottom: -20px;
            right: -10px;
            pointer-events: none;
            z-index: 0;
            user-select: none;
        }

        /* SVG Pencil handdrawn circle animation */
        .highlight-circle {
            animation: drawCircle 650ms cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @media print {
            .highlight-circle {
                display: none !important;
            }
        }

        /* Active word animation wash */
        .tts-word-active {
            border-radius: 4px;
            background-color: rgba(162, 155, 254, 0.15);
            transition: background-color 200ms ease;
        }
        [data-theme="light"] .tts-word-active {
            background-color: rgba(95, 79, 207, 0.12);
        }
    </style>
</head>
<body class="h-full flex items-center justify-center overflow-hidden transition-colors duration-200">

    <!-- Transition Flash Overlay -->
    <div id="transition-flash" class="fixed inset-0 bg-white pointer-events-none z-50 opacity-0"></div>

    <!-- Top Progress Bar -->
    <div id="top-progress" class="fixed top-0 left-0 w-full h-[3px] z-50 bg-gradient-to-r from-[#6c5ce7] to-[#a29bfe] shadow-sm transition-all duration-300" style="width: 0%"></div>

    <!-- Main Outer Container mimicking a 9:16 vertical card screen -->
    <div class="relative w-full max-w-md h-full md:h-[92vh] md:max-h-[850px] bg-zinc-900 dark:bg-zinc-950 border-0 md:border md:border-zinc-800 dark:md:border-zinc-800 md:rounded-3xl shadow-2xl flex flex-col justify-between overflow-hidden transition-all duration-300">
        
        <!-- Navigation Header -->
        <header class="p-4 border-b border-zinc-800 bg-zinc-900/80 dark:bg-zinc-950/80 backdrop-blur-md z-10 flex flex-col gap-1">
            <div id="topic-indicator-label" class="text-[10px] uppercase tracking-wider font-extrabold text-center text-zinc-500 dark:text-zinc-400">
                Lade Thema...
            </div>
            <div class="flex items-center justify-between mt-1">
                <div class="min-w-0">
                    <span id="topic-badge" class="px-2.5 py-0.5 rounded bg-indigo-500/20 text-indigo-400 text-[10px] font-black uppercase tracking-wider">Thema 1</span>
                    <h2 id="topic-title" class="text-sm font-black tracking-tight truncate max-w-[190px] mt-0.5 text-zinc-100 dark:text-zinc-50">Wird geladen...</h2>
                </div>
                <div class="flex items-center gap-1.5">
                    <button onclick="prevTopic()" class="p-2 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-zinc-300 hover:text-white transition-all text-xs flex items-center justify-center" title="Vorheriges Thema">
                        <i data-lucide="chevron-left" class="w-4 h-4"></i>
                    </button>
                    <button onclick="nextTopic()" class="p-2 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-zinc-300 hover:text-white transition-all text-xs flex items-center justify-center" title="Nächstes Thema">
                        <i data-lucide="chevron-right" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Carousel Workspace Stack -->
        <div id="reel-card-container" class="flex-1 relative flex flex-col justify-center px-4 py-4 transition-all duration-300">
            <!-- Active Card Container -->
            <div id="active-reel-card" class="w-full h-full rounded-2xl relative p-6 flex flex-col justify-between border border-zinc-800/80 dark:border-zinc-800 overflow-y-auto overflow-x-hidden custom-scrollbar transition-all duration-300 watermark-card">
                <!-- Content programmatically populated -->
            </div>
        </div>

        <!-- Language Subtitles Overlay -->
        <div id="translation-caption-container" class="px-4 py-3 bg-zinc-950/60 dark:bg-zinc-950 border-t border-zinc-800/60 text-center min-h-[65px] flex items-center justify-center transition-all duration-300">
            <p id="translation-subtitle" class="text-xs italic text-indigo-200 leading-relaxed font-semibold">Tippe auf den Text oder starte die Wiedergabe...</p>
        </div>

        <!-- Master Interface Controls panel -->
        <footer class="p-4 bg-zinc-900/90 dark:bg-zinc-950/90 border-t border-zinc-800 space-y-3.5 z-10">
            <!-- TTS Slider row -->
            <div class="grid grid-cols-2 gap-3 text-xs bg-zinc-950/50 dark:bg-zinc-900/30 p-2.5 rounded-xl border border-zinc-800/60">
                <div class="space-y-1">
                    <div class="flex justify-between text-zinc-400 font-bold text-[10px] uppercase">
                        <span>Geschwindigkeit</span>
                        <span id="speed-val">1.0x</span>
                    </div>
                    <input type="range" id="speed-slider" min="0.7" max="1.5" step="0.1" value="1.0" oninput="updateAudioParams()" class="w-full h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer accent-indigo-550">
                </div>
                <div class="space-y-1">
                    <div class="flex justify-between text-zinc-400 font-bold text-[10px] uppercase">
                        <span>Tonhöhe</span>
                        <span id="pitch-val">1.0</span>
                    </div>
                    <input type="range" id="pitch-slider" min="0.8" max="1.2" step="0.1" value="1.0" oninput="updateAudioParams()" class="w-full h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer accent-indigo-550">
                </div>
            </div>

            <div class="flex items-center gap-2">
                <!-- Dynamic Player buttons -->
                <button onclick="togglePlayback()" id="playback-btn" class="flex-1 flex items-center justify-center gap-2 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-extrabold text-xs shadow-lg shadow-indigo-600/10 transition-all active:scale-95" title="Wiedergabe umschalten">
                    <i id="playback-icon" data-lucide="play" class="w-4 h-4"></i>
                    <span id="playback-text">Wiedergabe</span>
                </button>

                <button onclick="stopPlayback()" class="p-3 rounded-xl bg-zinc-800 hover:bg-zinc-700 text-zinc-300 hover:text-white transition-all active:scale-95" title="Wiedergabe stoppen">
                    <i data-lucide="square" class="w-4.5 h-4.5"></i>
                </button>

                <!-- Translation Subtitle Switcher -->
                <select id="translation-selector" onchange="changeSubtitleLang()" class="text-xs bg-zinc-800 border border-zinc-700 rounded-xl px-2.5 py-3 font-bold text-zinc-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer">
                    <option value="en">Subtitle: EN</option>
                    <option value="ar">Subtitle: AR</option>
                    <option value="none">Keine Untertitel</option>
                </select>
            </div>

            <!-- Language and Voice Selector Configuration -->
            <div class="flex gap-2">
                <select id="lang-selector" onchange="changeTtsLang()" class="w-1/4 text-xs bg-zinc-800 border border-zinc-700 rounded-xl px-2 py-2.5 font-bold text-zinc-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer">
                    <option value="de" selected>DE</option>
                    <option value="en">EN</option>
                    <option value="ar">AR</option>
                </select>
                <select id="voice-selector" onchange="selectTtsVoice()" class="flex-1 text-xs bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2.5 font-bold text-zinc-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer">
                    <!-- Loaded dynamically -->
                </select>
            </div>
            
            <div class="flex items-center justify-between text-[10px] text-zinc-500 dark:text-zinc-400 font-extrabold px-1 uppercase tracking-wider">
                <span>Swipe für nächste Karte</span>
                <span>Wische / Klicke zum Navigieren</span>
            </div>
        </footer>
    </div>

    <!-- MAIN SOUND & VISUAL ENGINE -->
    <script>
        let topicsList = [];
        let activeIdx = 0;
        let activeTopic = null;
        let currentSlide = 0; 
        const TOTAL_SLIDES = 7;

        let isPlaying = false;
        let synth = window.speechSynthesis;
        let activeUtterance = null;
        let lastActiveSpan = null;
        let currentWordIndex = 0;
        
        let playbackSpeed = 1.0;
        let playbackPitch = 1.0;
        let ttsLang = 'de';
        let subtitleLang = 'en';
        let voicesList = [];
        let currentSelectedVoice = null;

        function syncThemeWithParent() {
            try {
                const parentTheme = window.parent && window.parent.document.documentElement.getAttribute('data-theme');
                if (parentTheme) {
                    document.documentElement.setAttribute('data-theme', parentTheme);
                    if (parentTheme === 'dark') {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }
                }
            } catch(e) {
                console.warn("Theme Sync missing, using default", e);
            }
        }

        // Feature: Online/Read Aloud Voice Matcher (Requirement 6)
        function populateVoiceSelector() {
            if (!synth) return;
            const selectEl = document.getElementById('voice-selector');
            if (!selectEl) return;

            voicesList = synth.getVoices();
            let filtered = voicesList.filter(v => v.lang.toLowerCase().startsWith(ttsLang));
            if (filtered.length === 0) {
                filtered = voicesList; 
            }

            // Prioritize Microsoft Edge Neural voices & high-quality online speech synthesizers
            filtered.sort((a, b) => {
                const aNat = a.name.includes("Neural") || a.name.includes("Natural") || a.name.includes("Google");
                const bNat = b.name.includes("Neural") || b.name.includes("Natural") || b.name.includes("Google");
                if (aNat && !bNat) return -1;
                if (!aNat && bNat) return 1;
                return a.name.localeCompare(b.name);
            });

            selectEl.innerHTML = "";
            filtered.forEach(voice => {
                const opt = document.createElement('option');
                opt.value = voice.name;
                const isNatural = voice.name.includes("Neural") || voice.name.includes("Natural") || voice.name.includes("Google");
                const cloudIcon = isNatural ? "✨" : (voice.localService ? "💻" : "🌐");
                opt.textContent = `${cloudIcon} ${voice.name}`;
                selectEl.appendChild(opt);
            });

            currentSelectedVoice = filtered[0] || null;
            if (currentSelectedVoice) {
                selectEl.value = currentSelectedVoice.name;
            }
        }

        function selectTtsVoice() {
            const selectEl = document.getElementById('voice-selector');
            currentSelectedVoice = voicesList.find(v => v.name === selectEl.value);
            if (isPlaying) {
                restartTtsSegment();
            }
        }

        function changeTtsLang() {
            ttsLang = document.getElementById('lang-selector').value;
            populateVoiceSelector();
            if (isPlaying) {
                restartTtsSegment();
            }
        }

        function updateAudioParams() {
            playbackSpeed = parseFloat(document.getElementById('speed-slider').value);
            playbackPitch = parseFloat(document.getElementById('pitch-slider').value);
            document.getElementById('speed-val').textContent = `${playbackSpeed.toFixed(1)}x`;
            document.getElementById('pitch-val').textContent = `${playbackPitch.toFixed(1)}`;
            if (isPlaying) {
                restartTtsSegment();
            }
        }

        function changeSubtitleLang() {
            subtitleLang = document.getElementById('translation-selector').value;
            renderCaptionLine();
        }

        // Natural hand-drawn wobbly circular pencil loop (Requirement 4)
        function wrapWithCircle(element, colorHex) {
            if (!element) return;
            removeCircle(element);

            const parent = element.parentNode;
            if (parent && getComputedStyle(parent).position === 'static') {
                parent.style.position = 'relative';
            }

            const rect = element.getBoundingClientRect();
            const W = rect.width;
            const H = rect.height;

            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("class", "highlight-circle absolute pointer-events-none z-10 overflow-visible");
            svg.style.width = (W + 28) + "px";
            svg.style.height = (H + 24) + "px";
            svg.style.top = (element.offsetTop - 12) + "px";
            svg.style.left = (element.offsetLeft - 14) + "px";

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            
            const cx = W / 2 + 14;
            const cy = H / 2 + 12;
            const rx = W / 2 + 10;
            const ry = H / 2 + 8;
            
            let pathPoints = [];
            const numSegments = 32;
            const totalAngle = 2 * Math.PI + 0.45; // spiral overlap
            
            for (let i = 0; i <= numSegments; i++) {
                const angle = (i / numSegments) * totalAngle;
                const wobble = Math.sin(angle * 5) * 1.5 + Math.cos(angle * 10) * 0.5;
                const radiusX = rx + wobble;
                const radiusY = ry + wobble;
                
                const x = cx + radiusX * Math.cos(angle) + (Math.random() * 1.2 - 0.6);
                const y = cy + radiusY * Math.sin(angle) + (Math.random() * 1.2 - 0.6);
                
                if (i === 0) {
                    pathPoints.push(`M ${x.toFixed(1)} ${y.toFixed(1)}`);
                } else {
                    pathPoints.push(`L ${x.toFixed(1)} ${y.toFixed(1)}`);
                }
            }
            
            path.setAttribute("d", pathPoints.join(" "));
            path.setAttribute("stroke", colorHex);
            path.setAttribute("stroke-width", "2.2");
            path.setAttribute("fill", "none");
            path.setAttribute("stroke-linecap", "round");
            path.setAttribute("stroke-linejoin", "round");
            path.style.opacity = "0.85";
            path.style.filter = "drop-shadow(0px 1px 1.5px rgba(0,0,0,0.15))";

            path.style.strokeDasharray = "500";
            path.style.strokeDashoffset = "500";
            
            svg.appendChild(path);
            element.parentNode.insertBefore(svg, element.nextSibling);
            element.highlightCircleSvg = svg;

            path.animate([
                { strokeDashoffset: "500" },
                { strokeDashoffset: "0" }
            ], {
                duration: 650,
                easing: 'cubic-bezier(0.25, 1, 0.5, 1)',
                fill: 'forwards'
            });
        }

        function removeCircle(element) {
            if (!element) return;
            if (element.highlightCircleSvg) {
                if (element.highlightCircleSvg.parentNode) {
                    element.highlightCircleSvg.parentNode.removeChild(element.highlightCircleSvg);
                }
                element.highlightCircleSvg = null;
            }
            let sibling = element.nextSibling;
            if (sibling && sibling.classList && sibling.classList.contains('highlight-circle')) {
                sibling.parentNode.removeChild(sibling);
            }
        }

        function getColorForContext(contextType) {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            switch(contextType) {
                case 'tts':
                    return isDark ? '#a29bfe' : '#5f4fcf';
                case 'keyword':
                    return isDark ? '#fdcb6e' : '#c9860c';
                case 'pro':
                    return isDark ? '#00cec9' : '#007a73';
                case 'contra':
                    return isDark ? '#ff7675' : '#c0392b';
                case 'dialog_a':
                    return isDark ? '#74b9ff' : '#2980b9';
                case 'dialog_b':
                    return isDark ? '#fd79a8' : '#a8315e';
                default:
                    return isDark ? '#a29bfe' : '#5f4fcf';
            }
        }

        // Bug Fix Highlighting: check for empty text (Requirement 3)
        function textToWordSpans(text, contextType) {
            if (!text) return "";
            const div = document.createElement('div');
            div.innerHTML = text;
            const plain = div.textContent || div.innerText || "";
            if (!plain.trim()) return ""; // Requirement 3
            
            const words = plain.split(/(\s+)/);
            let html = "";
            let charIdx = 0;
            
            words.forEach(word => {
                if (word.trim() === "") {
                    html += word;
                    charIdx += word.length;
                } else {
                    html += `<span class="tts-word relative cursor-pointer inline-block" data-start="${charIdx}" data-end="${charIdx + word.length}" data-context="${contextType}">${word}</span>`;
                    charIdx += word.length;
                }
            });
            return html;
        }

        async function initializeReelEngine() {
            syncThemeWithParent();
            if (window.parent && window.parent.TOPICS_DATA && window.parent.TOPICS_DATA.length > 0) {
                topicsList = window.parent.TOPICS_DATA;
                // If the parent has activeIdx = -1 (Mind Map active), start with Topic index 0 inside Reel mode
                const parentIdx = window.parent.activeIdx;
                activeIdx = (parentIdx === -1) ? 0 : parentIdx;
            } else {
                try {
                    const response = await fetch('topics.json');
                    topicsList = await response.json();
                    activeIdx = 0;
                } catch(e) {
                    console.error("Fallback load failed", e);
                }
            }

            if (synth) {
                synth.onvoiceschanged = () => {
                    populateVoiceSelector();
                };
                populateVoiceSelector();
            }

            loadActiveTopic();
            lucide.createIcons();
        }

        function loadActiveTopic() {
            if (topicsList.length === 0) return;
            activeTopic = topicsList[activeIdx];

            if (window.parent && typeof window.parent.activeIdx !== 'undefined' && window.parent.activeIdx !== -1) {
                window.parent.activeIdx = activeIdx;
                if (typeof window.parent.renderActiveTopic === 'function') {
                    window.parent.renderActiveTopic();
                    window.parent.renderSidebar();
                }
            }

            document.getElementById('topic-badge').textContent = `Thema ${activeTopic.id} / 52`;
            document.getElementById('topic-title').textContent = activeTopic.title_de;

            resetPlaybackState();
            renderActiveSlide();
            updateTopProgress();
        }

        function updateTopProgress() {
            const bar = document.getElementById('top-progress');
            const percent = ((currentSlide + 1) / TOTAL_SLIDES) * 100;
            bar.style.width = `${percent}%`;

            const label = document.getElementById('topic-indicator-label');
            label.textContent = `Thema ${activeTopic.id} · Karte ${currentSlide + 1} von ${TOTAL_SLIDES}`;
        }

        function renderActiveSlide() {
            const card = document.getElementById('active-reel-card');
            card.className = "w-full h-full rounded-2xl relative p-6 flex flex-col justify-between border border-zinc-800/80 dark:border-zinc-800 overflow-y-auto overflow-x-hidden custom-scrollbar watermark-card card-active";
            
            const oldSvgs = card.querySelectorAll('.highlight-circle');
            oldSvgs.forEach(s => s.parentNode.removeChild(s));

            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            let bgStyle = "";
            let watermark = "📖";

            switch(currentSlide) {
                case 0: 
                    bgStyle = isDark 
                        ? "radial-gradient(ellipse at 20% 20%, #3d1a78 0%, #0f0f10 70%)"
                        : "radial-gradient(ellipse at 20% 20%, rgba(61, 26, 120, 0.07) 0%, #f7f6f2 70%)";
                    watermark = "📖";
                    buildIntroSlide(card);
                    break;
                case 1: 
                    bgStyle = isDark 
                        ? "radial-gradient(ellipse at 20% 10%, #003d2b 0%, #0f0f10 70%)"
                        : "radial-gradient(ellipse at 20% 10%, rgba(0, 61, 43, 0.07) 0%, #f7f6f2 70%)";
                    watermark = "👍";
                    buildProSlide(card);
                    break;
                case 2: 
                    bgStyle = isDark 
                        ? "radial-gradient(ellipse at 20% 10%, #3d1500 0%, #0f0f10 70%)"
                        : "radial-gradient(ellipse at 20% 10%, rgba(61, 21, 0, 0.07) 0%, #f7f6f2 70%)";
                    watermark = "👎";
                    buildContraSlide(card);
                    break;
                case 3: 
                    bgStyle = isDark 
                        ? "radial-gradient(ellipse at 30% 15%, #2d2000 0%, #0f0f10 70%)"
                        : "radial-gradient(ellipse at 30% 15%, rgba(45, 32, 0, 0.07) 0%, #f7f6f2 70%)";
                    watermark = "👤";
                    buildPersonalSlide(card);
                    break;
                case 4: 
                    bgStyle = isDark 
                        ? "radial-gradient(ellipse at 20% 10%, #001a3d 0%, #0f0f10 70%)"
                        : "radial-gradient(ellipse at 20% 10%, rgba(0, 26, 61, 0.07) 0%, #f7f6f2 70%)";
                    watermark = "💬";
                    buildDialogSlide(card);
                    break;
                case 5: 
                    bgStyle = isDark 
                        ? "radial-gradient(ellipse at 80% 80%, #1a0d3d 0%, #0f0f10 70%)"
                        : "radial-gradient(ellipse at 80% 80%, rgba(26, 13, 61, 0.07) 0%, #f7f6f2 70%)";
                    watermark = "🎯";
                    buildSchlussSlide(card);
                    break;
                case 6: 
                    bgStyle = isDark 
                        ? "radial-gradient(ellipse at 20% 10%, #200d3d 0%, #0f0f10 70%)"
                        : "radial-gradient(ellipse at 20% 10%, rgba(32, 13, 61, 0.07) 0%, #f7f6f2 70%)";
                    watermark = "🔑";
                    buildKeywordsSlide(card);
                    break;
            }

            card.style.background = bgStyle;
            card.style.setProperty('--watermark-icon', `'${watermark}'`);
            renderCaptionLine();
        }

        function buildIntroSlide(card) {
            const deText = textToWordSpans(activeTopic.einleitung_de, 'tts');
            card.innerHTML = `
                <div class="relative z-10 w-full flex flex-col justify-between h-full stagger-child">
                    <div>
                        <span class="px-2 py-0.5 rounded text-[9px] font-bold bg-indigo-500/20 text-indigo-400 uppercase">1. Einleitung</span>
                        <h3 class="text-base font-black text-zinc-100 dark:text-zinc-50 mt-2">Thema einleiten</h3>
                    </div>
                    <div class="my-auto py-4">
                        <p id="tts-content-container" class="text-base md:text-lg font-semibold leading-relaxed text-zinc-100 border-l-2 border-indigo-500 pl-4 py-1">${deText}</p>
                    </div>
                    <div class="text-[10px] text-zinc-500">Tippe auf ein Wort für einen natürlichen Kreis.</div>
                </div>
            `;
        }

        function buildProSlide(card) {
            let listHtml = "";
            activeTopic.pro_de.forEach((pro, index) => {
                const spanified = textToWordSpans(pro, 'pro');
                listHtml += `
                    <div class="stagger-child bg-zinc-950/40 p-3 rounded-xl border border-zinc-800/80 flex gap-2">
                        <span class="text-emerald-400 font-extrabold text-sm">✓</span>
                        <p class="text-xs md:text-sm font-semibold text-zinc-200 leading-relaxed">${spanified}</p>
                    </div>
                `;
            });
            card.innerHTML = `
                <div class="relative z-10 w-full flex flex-col justify-between h-full">
                    <div>
                        <span class="px-2 py-0.5 rounded text-[9px] font-bold bg-emerald-500/20 text-emerald-400 uppercase">2. Dafür (Pro)</span>
                        <h3 class="text-base font-black text-zinc-100 dark:text-zinc-50 mt-2">Dafür-Argumente</h3>
                    </div>
                    <div id="tts-content-container" class="space-y-2.5 my-auto py-4">
                        ${listHtml}
                    </div>
                    <div class="text-[10px] text-zinc-500">Argumentationskette für die Diskussion.</div>
                </div>
            `;
        }

        function buildContraSlide(card) {
            let listHtml = "";
            activeTopic.contra_de.forEach((contra, index) => {
                const spanified = textToWordSpans(contra, 'contra');
                listHtml += `
                    <div class="stagger-child bg-zinc-950/40 p-3 rounded-xl border border-zinc-800/80 flex gap-2">
                        <span class="text-rose-400 font-extrabold text-sm">✗</span>
                        <p class="text-xs md:text-sm font-semibold text-zinc-200 leading-relaxed">${spanified}</p>
                    </div>
                `;
            });
            card.innerHTML = `
                <div class="relative z-10 w-full flex flex-col justify-between h-full">
                    <div>
                        <span class="px-2 py-0.5 rounded text-[9px] font-bold bg-rose-500/20 text-rose-400 uppercase">3. Dagegen (Contra)</span>
                        <h3 class="text-base font-black text-zinc-100 dark:text-zinc-50 mt-2">Dagegen-Argumente</h3>
                    </div>
                    <div id="tts-content-container" class="space-y-2.5 my-auto py-4">
                        ${listHtml}
                    </div>
                    <div class="text-[10px] text-zinc-500">Gegenargumente parat haben.</div>
                </div>
            `;
        }

        function buildPersonalSlide(card) {
            const deText = textToWordSpans(activeTopic.pers_erfahrung_de, 'tts');
            card.innerHTML = `
                <div class="relative z-10 w-full flex flex-col justify-between h-full stagger-child">
                    <div>
                        <span class="px-2 py-0.5 rounded text-[9px] font-bold bg-amber-500/20 text-amber-400 uppercase">4. Erfahrung</span>
                        <h3 class="text-base font-black text-zinc-100 dark:text-zinc-50 mt-2">Eigene Erfahrungen teilen</h3>
                    </div>
                    <div class="my-auto py-4">
                        <p id="tts-content-container" class="text-sm md:text-base font-medium leading-relaxed text-zinc-100 border-l-2 border-amber-500 pl-4 py-1">${deText}</p>
                    </div>
                    <div class="text-[10px] text-zinc-500">Zeigt persönliche Relevanz im B2-Niveau.</div>
                </div>
            `;
        }

        function buildDialogSlide(card) {
            let dialogHtml = "";
            activeTopic.dialog.forEach((chat, index) => {
                const isA = chat.role.includes('Schüler A') || chat.role.includes('Schülerin A');
                const roleType = isA ? 'dialog_a' : 'dialog_b';
                const spanified = textToWordSpans(chat.de, roleType);
                dialogHtml += `
                    <div class="stagger-child p-3 rounded-xl border ${
                        isA 
                        ? 'bg-zinc-950/50 border-indigo-900/60 text-indigo-200' 
                        : 'bg-indigo-950/20 border-zinc-800 text-zinc-300'
                    }">
                        <span class="text-[8px] font-extrabold uppercase tracking-widest block mb-1 text-zinc-400">${chat.role}</span>
                        <p class="text-xs font-semibold leading-relaxed text-zinc-100">${spanified}</p>
                    </div>
                `;
            });
            card.innerHTML = `
                <div class="relative z-10 w-full flex flex-col justify-between h-full">
                    <div>
                        <span class="px-2 py-0.5 rounded text-[9px] font-bold bg-purple-500/20 text-purple-400 uppercase">5. Dialog</span>
                        <h3 class="text-base font-black text-zinc-100 dark:text-zinc-50 mt-1">Prüfungssimulation</h3>
                    </div>
                    <div id="tts-content-container" class="space-y-2 max-h-[340px] overflow-y-auto custom-scrollbar pr-1 my-auto py-2">
                        ${dialogHtml}
                    </div>
                    <div class="text-[10px] text-zinc-500">Wechselgespräch nachempfinden.</div>
                </div>
            `;
        }

        function buildSchlussSlide(card) {
            const deText = textToWordSpans(activeTopic.schluss_de, 'tts');
            card.innerHTML = `
                <div class="relative z-10 w-full flex flex-col justify-between h-full stagger-child">
                    <div>
                        <span class="px-2 py-0.5 rounded text-[9px] font-bold bg-yellow-500/20 text-yellow-400 uppercase">6. Gemeinsame Lösung</span>
                        <h3 class="text-base font-black text-zinc-100 dark:text-zinc-50 mt-2">Kompromiss & Schluss</h3>
                    </div>
                    <div class="my-auto py-4">
                        <p id="tts-content-container" class="text-base font-semibold leading-relaxed text-zinc-100 border-l-2 border-yellow-500 pl-4 py-1">${deText}</p>
                    </div>
                    <div class="text-[10px] text-zinc-500">Das Gespräch gemeinsam beenden.</div>
                </div>
            `;
        }

        let currentlyHighlightedKeywordChip = null;
        function buildKeywordsSlide(card) {
            let kwBadges = "";
            if (activeTopic.keywords) {
                const list = activeTopic.keywords.split(',').map(k => k.trim()).filter(Boolean);
                list.forEach((kw, index) => {
                    kwBadges += `
                        <button onclick="tapKeywordChip(this)" class="stagger-child px-3 py-2 text-xs font-semibold bg-zinc-950/60 hover:bg-zinc-900 border border-zinc-800 text-zinc-300 rounded-xl transition-all relative inline-block">
                            ${kw}
                        </button>
                    `;
                });
            }
            card.innerHTML = `
                <div class="relative z-10 w-full flex flex-col justify-between h-full">
                    <div>
                        <span class="px-2 py-0.5 rounded text-[9px] font-bold bg-pink-500/20 text-pink-400 uppercase">7. Schlüsselwörter</span>
                        <h3 class="text-base font-black text-zinc-100 dark:text-zinc-50 mt-2">Keywords & Wortschatz</h3>
                    </div>
                    <div class="flex flex-wrap gap-2.5 my-auto py-4 justify-center">
                        ${kwBadges}
                    </div>
                    <div class="text-[10px] text-zinc-500">Wichtige Schlüsselbegriffe im Überblick.</div>
                </div>
            `;
        }

        function tapKeywordChip(chipEl) {
            if (currentlyHighlightedKeywordChip) {
                removeCircle(currentlyHighlightedKeywordChip);
                currentlyHighlightedKeywordChip.style.transform = 'none';
            }

            currentlyHighlightedKeywordChip = chipEl;
            const color = getColorForContext('keyword');
            wrapWithCircle(chipEl, color);

            chipEl.animate([
                { transform: 'scale(1)' },
                { transform: 'scale(1.12)' },
                { transform: 'scale(1)' }
            ], {
                duration: 400,
                easing: 'cubic-bezier(0.16, 1, 0.3, 1)'
            });
            chipEl.style.transform = 'scale(1.12)';
        }

        function renderCaptionLine() {
            const container = document.getElementById('translation-subtitle');
            if (subtitleLang === 'none') {
                container.textContent = "";
                return;
            }

            let text = "";
            let isRTL = false;

            if (currentSlide === 0) {
                text = (subtitleLang === 'en') ? activeTopic.einleitung_en : activeTopic.einleitung_ar;
            } else if (currentSlide === 1) {
                text = (subtitleLang === 'en') ? activeTopic.pro_en.join(" · ") : activeTopic.pro_ar.join(" · ");
            } else if (currentSlide === 2) {
                text = (subtitleLang === 'en') ? activeTopic.contra_en.join(" · ") : activeTopic.contra_ar.join(" · ");
            } else if (currentSlide === 3) {
                text = (subtitleLang === 'en') ? activeTopic.pers_erfahrung_en : activeTopic.pers_erfahrung_ar;
            } else if (currentSlide === 4) {
                if (isPlaying && currentWordIndex >= 0 && currentWordIndex < activeTopic.dialog.length) {
                    const activeDialog = activeTopic.dialog[currentWordIndex];
                    text = (subtitleLang === 'en') ? activeDialog.en : activeDialog.ar;
                } else {
                    text = (subtitleLang === 'en') ? "Dialog Translation Feed" : "موجز ترجمة الحوار";
                }
            } else if (currentSlide === 5) {
                text = (subtitleLang === 'en') ? activeTopic.schluss_en : activeTopic.schluss_ar;
            } else {
                text = (subtitleLang === 'en') ? "Keywords Overview" : "نظرة عامة على الكلمات المفتاحية";
            }

            if (subtitleLang === 'ar') {
                isRTL = true;
            }

            container.textContent = text || "";
            container.dir = isRTL ? 'rtl' : 'ltr';
            if (isRTL) {
                container.className = "text-sm text-amber-300 font-bold text-center leading-relaxed w-full";
            } else {
                container.className = "text-xs italic text-indigo-200 leading-relaxed font-semibold";
            }
        }

        document.addEventListener('click', (e) => {
            const word = e.target.closest('.tts-word');
            if (word) {
                if (word.highlightCircleSvg) {
                    removeCircle(word);
                } else {
                    const ctx = word.getAttribute('data-context') || 'tts';
                    wrapWithCircle(word, getColorForContext(ctx));
                }
            }
        });

        function togglePlayback() {
            if (isPlaying) {
                synth.pause();
                isPlaying = false;
                document.getElementById('playback-icon').setAttribute('data-lucide', 'play');
                document.getElementById('playback-text').textContent = "Fortsetzen";
                lucide.createIcons();
            } else {
                if (synth.paused) {
                    synth.resume();
                    isPlaying = true;
                    document.getElementById('playback-icon').setAttribute('data-lucide', 'pause');
                    document.getElementById('playback-text').textContent = "Pausieren";
                    lucide.createIcons();
                } else {
                    startSpeechSynthesis();
                }
            }
        }

        function stopPlayback() {
            resetPlaybackState();
        }

        function restartTtsSegment() {
            if (isPlaying) {
                synth.cancel();
                startSpeechSynthesis();
            }
        }

        function startSpeechSynthesis() {
            if (!activeTopic) return;
            resetUtterances();

            const container = document.getElementById('tts-content-container');
            if (!container) return;

            const spans = container.querySelectorAll('.tts-word');
            if (spans.length === 0) return;

            let rawString = "";
            spans.forEach(s => {
                const wordText = s.textContent || s.innerText || "";
                s.setAttribute('data-start', rawString.length);
                rawString.length += wordText.length;
                s.setAttribute('data-end', rawString.length);
                rawString += " ";
                rawString.length += 1; 
            });

            activeUtterance = new SpeechSynthesisUtterance(container.textContent || container.innerText || "");
            activeUtterance.lang = ttsLang === 'de' ? 'de-DE' : (ttsLang === 'en' ? 'en-US' : 'ar-SA');
            activeUtterance.rate = playbackSpeed;
            activeUtterance.pitch = playbackPitch;

            if (currentSelectedVoice) {
                activeUtterance.voice = currentSelectedVoice;
            }

            activeUtterance.onboundary = (event) => {
                if (event.name === 'word') {
                    const charIndex = event.charIndex;
                    let matchedSpan = null;

                    spans.forEach(span => {
                        const start = parseInt(span.getAttribute('data-start'));
                        const end = parseInt(span.getAttribute('data-end'));
                        if (charIndex >= start && charIndex <= end) {
                            matchedSpan = span;
                        }
                    });

                    if (matchedSpan) {
                        if (lastActiveSpan) {
                            lastActiveSpan.classList.remove('tts-word-active');
                            removeCircle(lastActiveSpan);
                        }

                        matchedSpan.classList.add('tts-word-active');
                        const context = matchedSpan.getAttribute('data-context') || 'tts';
                        wrapWithCircle(matchedSpan, getColorForContext(context));
                        lastActiveSpan = matchedSpan;
                        matchedSpan.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                }
            };

            activeUtterance.onend = () => {
                resetPlaybackState();
            };

            activeUtterance.onerror = (e) => {
                if (e.error !== 'interrupted') {
                    resetPlaybackState();
                }
            };

            isPlaying = true;
            document.getElementById('playback-icon').setAttribute('data-lucide', 'pause');
            document.getElementById('playback-text').textContent = "Pausieren";
            lucide.createIcons();
            synth.speak(activeUtterance);
        }

        function resetUtterances() {
            synth.cancel();
            if (activeUtterance) {
                activeUtterance.onboundary = null;
                activeUtterance.onend = null;
                activeUtterance.onerror = null;
            }
        }

        function resetPlaybackState() {
            resetUtterances();
            isPlaying = false;
            document.getElementById('playback-icon').setAttribute('data-lucide', 'play');
            document.getElementById('playback-text').textContent = "Simulation starten";
            lucide.createIcons();

            if (lastActiveSpan) {
                lastActiveSpan.classList.remove('tts-word-active');
                removeCircle(lastActiveSpan);
                lastActiveSpan = null;
            }

            const container = document.getElementById('tts-content-container');
            if (container) {
                const spans = container.querySelectorAll('.tts-word');
                spans.forEach(s => {
                    s.classList.remove('tts-word-active');
                    removeCircle(s);
                });
            }
        }

        function triggerTransitionFlash() {
            const flash = document.getElementById('transition-flash');
            if (!flash) return;
            flash.animate([
                { opacity: 0 },
                { opacity: 0.12 },
                { opacity: 0 }
            ], {
                duration: 600,
                easing: 'ease-out'
            });
        }

        function goToNextCard() {
            if (currentSlide < TOTAL_SLIDES - 1) {
                currentSlide++;
                renderActiveSlide();
                updateTopProgress();
            } else {
                if (activeIdx < topicsList.length - 1) {
                    triggerTransitionFlash();
                    activeIdx++;
                    currentSlide = 0;
                    loadActiveTopic();
                }
            }
            dragContainer.style.transform = 'translateY(0)';
        }

        function goToPrevCard() {
            if (currentSlide > 0) {
                currentSlide--;
                renderActiveSlide();
                updateTopProgress();
            } else {
                if (activeIdx > 0) {
                    triggerTransitionFlash();
                    activeIdx--;
                    currentSlide = TOTAL_SLIDES - 1;
                    loadActiveTopic();
                }
            }
            dragContainer.style.transform = 'translateY(0)';
        }

        function prevTopic() {
            if (topicsList.length === 0) return;
            activeIdx = (activeIdx - 1 + topicsList.length) % topicsList.length;
            currentSlide = 0;
            loadActiveTopic();
        }

        function nextTopic() {
            if (topicsList.length === 0) return;
            activeIdx = (activeIdx + 1) % topicsList.length;
            currentSlide = 0;
            loadActiveTopic();
        }

        let touchStartY = 0;
        let dragDeltaY = 0;
        const dragContainer = document.getElementById('reel-card-container');

        dragContainer.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
            dragDeltaY = 0;
        }, { passive: true });

        dragContainer.addEventListener('touchmove', (e) => {
            const deltaY = e.touches[0].clientY - touchStartY;
            dragDeltaY = deltaY;
            dragContainer.style.transform = `translateY(${dragDeltaY * 0.35}px)`;
            dragContainer.style.transition = 'none';
        }, { passive: true });

        dragContainer.addEventListener('touchend', () => {
            dragContainer.style.transition = 'transform 400ms cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            if (dragDeltaY < -100) {
                goToNextCard();
            } else if (dragDeltaY > 100) {
                goToPrevCard();
            } else {
                dragContainer.style.transform = 'translateY(0)';
            }
        });

        initializeReelEngine();
    </script>
</body>
</html>
