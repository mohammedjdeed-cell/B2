<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium background gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    
    <!-- Sophisticated shadows -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.3" />
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4f46e5" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Base App Canvas -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Inner Decorative Circle Border -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#6366f1" stroke-width="4" stroke-opacity="0.3" />

  <!-- Main Speech Bubble / Discussion Symbol -->
  <g filter="url(#shadow)">
    <!-- Right side conversational bubble -->
    <path d="M 330 310 C 330 365, 270 410, 195 410 C 160 410, 130 400, 110 385 C 80 400, 45 405, 30 405 C 50 380, 55 350, 50 335 C 30 310, 20 280, 20 250 C 20 167, 100 100, 195 100 C 290 100, 370 167, 370 250" fill="none" />
    
    <!-- Elegant White/Slate Speech Bubble Container -->
    <path d="M380 230 C380 147.16 308.37 80 220 80 C131.63 80 60 147.16 60 230 C60 274.55 81.33 313.78 115 340.85 C111.45 353.48 102.39 377.29 86 397.64 C104.91 395.77 132.8 389.06 156.4 374.55 C175.76 381.18 197.2 384.85 220 384.85 C308.37 384.85 380 317.69 380 230 Z" fill="url(#bubbleGrad)" />
  </g>

  <!-- Stylized Elegant German Accent Ribbons near bottom right -->
  <path d="M420,380 L480,380 L460,400 L400,400 Z" fill="#ff0000" opacity="0.85" />
  <path d="M410,360 L470,360 L450,380 L390,380 Z" fill="#111111" />
  <path d="M430,400 L490,400 L470,420 L410,420 Z" fill="#ffcc00" opacity="0.9" />

  <!-- "B2" Icon Text -->
  <text x="220" y="270" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="900" font-size="124" fill="#1e1b4b" text-anchor="middle" letter-spacing="-2">B2</text>
  
  <!-- "TRAINER" banner tag -->
  <rect x="110" y="295" width="220" height="42" rx="12" fill="url(#accentGrad)" filter="url(#glow)" />
  <text x="220" y="323" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="800" font-size="22" fill="#ffffff" text-anchor="middle" letter-spacing="4">TRAINER</text>

  <!-- Accent Chat sparkles -->
  <circle cx="390" cy="130" r="10" fill="#fef08a" />
  <circle cx="430" cy="170" r="14" fill="#fef08a" />
</svg>
